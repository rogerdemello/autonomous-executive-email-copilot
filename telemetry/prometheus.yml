# Prometheus scrape config for the Autonomous Executive Email Copilot API.
# The API exposes Prometheus-format metrics at GET /metrics.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: exec-email-copilot
    metrics_path: /metrics
    static_configs:
      # When running via telemetry/docker-compose.observability.yml the app is
      # reachable on the host; adjust the target for your deployment.
      - targets: ['host.docker.internal:7860']
        labels:
          service: exec-email-copilot
