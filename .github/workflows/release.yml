name: Release

# Cut a release by pushing a semver tag, e.g. `git tag v1.2.3 && git push origin v1.2.3`.
on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write   # create the GitHub Release and upload artifacts
  packages: write   # push the image to GHCR

env:
  # NOTE: replace OWNER/REPO with the actual GitHub owner/repository slug
  # (lowercase). Both the GHCR image name and the release target use this.
  IMAGE_NAME: ghcr.io/OWNER/REPO

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME}"
          {
            echo "image_version=${IMAGE_NAME}:${version}"
            echo "image_latest=${IMAGE_NAME}:latest"
            echo "version=${version}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tags.outputs.image_version }}
            ${{ steps.tags.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM (SPDX JSON)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ steps.tags.outputs.image_version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Extract CHANGELOG section for this tag
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Pull the body between the matching `## [X.Y.Z]` heading and the next `## ` heading.
          body="$(awk -v ver="$version" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md)"
          if [ -z "$(printf '%s' "$body" | tr -d '[:space:]')" ]; then
            body="Release ${GITHUB_REF_NAME}. See CHANGELOG.md for details."
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tags.outputs.version }}
          body: ${{ steps.changelog.outputs.body }}
          files: sbom.spdx.json
