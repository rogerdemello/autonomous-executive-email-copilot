name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      - name: pytest + coverage gate
        run: >-
          python -m pytest -q
          --cov=env --cov=baseline --cov=benchmark --cov=reports --cov=telemetry --cov=server
          --cov-report=xml --cov-report=term-missing --cov-fail-under=78
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
        continue-on-error: true  # don't fail CI when no token is configured

  typecheck:
    runs-on: ubuntu-latest
    continue-on-error: true  # informational until the codebase is fully typed
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install mypy
      - run: mypy env --ignore-missing-imports --no-strict-optional || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install bandit pip-audit
      - name: bandit (SAST)
        run: bandit -r env baseline benchmark reports telemetry server -ll
      - name: pip-audit (dependency vulnerabilities)
        run: pip-audit -r requirements.txt
        continue-on-error: true  # advisories may be unfixable upstream; informational

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci || npm install
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: Unit tests (vitest)
        run: npm test
      - name: TypeScript check
        run: npx tsc --noEmit
      - name: Build dashboard
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t exec-email-copilot .
      - name: Smoke test container
        run: |
          docker run -d --name app -p 7860:7860 exec-email-copilot
          ok=0
          for _ in $(seq 1 30); do
            if curl -fsS http://localhost:7860/health > /dev/null; then ok=1; break; fi
            sleep 2
          done
          if [ "$ok" != "1" ]; then docker logs app; exit 1; fi
          curl -fsS http://localhost:7860/docs > /dev/null
          curl -fsS http://localhost:7860/dashboard/ > /dev/null
          docker rm -f app

  inference-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install -r requirements.txt
      - name: Inference (baseline fallback, no provider key)
        run: python inference.py --task easy_classification --max-steps 20
