[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "autonomous-executive-email-copilot"
version = "0.1.0"
description = "OpenEnv-style executive inbox simulation with typed API, graders, and baselines"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastapi",
  "uvicorn",
  "pydantic",
  "pyyaml",
  "httpx",
  "scipy",
  "pytest",
  "streamlit",
  "openai",
  "openenv-core>=0.2.0",
]

[project.scripts]
server = "server.app:main"

[tool.setuptools]
packages = ["env", "baseline", "server"]