# Pre-commit hooks. Install with:  pip install pre-commit && pre-commit install
# Run on the whole repo:            pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff           # lint (autofix)
        args: [--fix]
      - id: ruff-format    # format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1024]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier       # format the React dashboard sources
        files: ^dashboard/src/.*\.(ts|tsx|css)$
