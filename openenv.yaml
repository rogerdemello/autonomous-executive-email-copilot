name: autonomous-executive-email-copilot
version: 0.1.0
description: Executive inbox simulation with planning, risk, and communication constraints
runtime:
  type: python
  entrypoint: uvicorn env.api:app --host 0.0.0.0 --port 8000
environment:
  observation_model: env.models.Observation
  action_model: env.models.Action
  methods:
    - reset
    - step
    - state
tasks:
  - id: easy_classification
    difficulty: easy
  - id: medium_prioritization
    difficulty: medium
  - id: hard_full_management
    difficulty: hard
endpoints:
  - path: /reset
  - path: /step
  - path: /state
  - path: /tasks
  - path: /grader
  - path: /baseline
  - path: /leaderboard
