    sender: client.apac@clientco.com
    sender_role: client
    subject: Renewal terms clarification
    body: Please confirm pricing tiers by tomorrow.
    priority_hint: high
    deadline_minutes: 600
    business_value: 0.92
    risk_tag: legal
    expected_label: urgent
    expected_action: reply
    expected_reply_keywords: [pricing, confirm]
