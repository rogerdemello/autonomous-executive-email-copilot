    sender: finance@company.com
    sender_role: internal
    subject: Budget review tomorrow
    body: Please review Q2 budget draft before tomorrow noon.
    priority_hint: medium
    deadline_minutes: 720
    business_value: 0.7
    risk_tag: finance
    expected_label: normal
    expected_action: defer
  - id: e4
    sender: vendor@supply.com
    sender_role: vendor
    subject: Invoice reminder
    body: Invoice 7821 pending for 14 days.
    priority_hint: medium
    deadline_minutes: 480
    business_value: 0.4
    risk_tag: finance
    expected_label: normal
    expected_action: reply
    expected_reply_keywords: [invoice, payment]
  - id: e5
    sender: security@company.com
    sender_role: internal
    subject: Security patch verification
    body: Confirm executive laptop patch completion by EOD.
    priority_hint: high
    deadline_minutes: 300
    business_value: 0.8
    risk_tag: security
