time_budget: 90
risk_level: low
emails:
  - id: e1
    sender: deals@clientco.com
    sender_role: client
    subject: "URGENT: Contract redlines needed"
    body: Need final legal redlines in 2 hours.
    priority_hint: high
    deadline_minutes: 120
    business_value: 0.95
    risk_tag: legal
    expected_label: urgent
    expected_action: reply
    expected_reply_keywords: [redlines, timeline]
    critical: true
  - id: e2
    sender: newsletter@randomsite.com
    sender_role: unknown
    subject: Top 50 productivity hacks
    body: Subscribe now and save 80 percent.
    priority_hint: low
    deadline_minutes: 1000
    business_value: 0.05
    expected_label: spam
    expected_action: ignore
